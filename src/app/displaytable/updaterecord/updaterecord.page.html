<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title class="viewfull">{{ myTitle }}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <app-presentationrecord action="update" [table]="table" [selcol]="selcol" [selid]="selid" [id]="id"></app-presentationrecord>
  <br>
  <br>
  <br>
  <ion-fab vertical="bottom" horizontal="start" slot="fixed">
    <ion-fab-button class="otherbutton" id="cancelid" (click)="gotoUpperPage()">
      <ion-icon name="close-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button type="submit" class="actionbutton" id="validid" (click)="onSubmitAction()">
      <ion-icon name="checkmark-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
