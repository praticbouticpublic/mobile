
<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{myTitle}}</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content id="mainic" scroll-x="true" scroll-y="true">
  <app-presentationtable [table]="table" [selcol]="selcol" [selid]="selid" writable="true"></app-presentationtable>
  <br>
  <br>
  <br>
  <ion-fab *ngIf="(table !== 'commande') &&  (table !== 'lignecmd')" vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button class="actionbutton" (click)="goToInsertPage(table, selcol, selid)">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-fab *ngIf="selid !== 0" vertical="bottom" horizontal="start" slot="fixed">
    <ion-fab-button class="otherbutton" id="exitid" (click)="gotoUpperPage()">
      <ion-icon name="return-down-back-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
